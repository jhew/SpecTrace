name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version number without v prefix (e.g. 1.2.3)"
        required: true
        default: "1.0.0"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      # ------------------------------------------------------------------ #
      # 1. Source
      # ------------------------------------------------------------------ #
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------------ #
      # 2. Toolchain
      # ------------------------------------------------------------------ #
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # ------------------------------------------------------------------ #
      # 3. Resolve version
      # ------------------------------------------------------------------ #
      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $ver = "${{ github.event.inputs.version }}"
          } else {
            $ver = "${{ github.ref_name }}" -replace '^v', ''
          }
          Write-Host "Version: $ver"
          "ver=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # ------------------------------------------------------------------ #
      # 4. Publish portable exe (framework-dependent, single-file)
      # ------------------------------------------------------------------ #
      - name: Publish portable exe
        shell: pwsh
        run: |
          dotnet publish src/SpecTrace/SpecTrace.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained false `
            --output publish `
            -p:PublishSingleFile=true `
            -p:DebugType=None `
            -p:DebugSymbols=false `
            -p:Version=${{ steps.version.outputs.ver }} `
            -p:AssemblyVersion=${{ steps.version.outputs.ver }}.0 `
            -p:FileVersion=${{ steps.version.outputs.ver }}.0

      # ------------------------------------------------------------------ #
      # 5. Install Inno Setup
      # ------------------------------------------------------------------ #
      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      # ------------------------------------------------------------------ #
      # 6. Build Inno Setup installer
      # ------------------------------------------------------------------ #
      - name: Build installer (Inno Setup)
        shell: pwsh
        working-directory: installer
        run: |
          $isccCmd = Get-Command "iscc.exe" -ErrorAction SilentlyContinue
          if (-not $isccCmd) {
            throw "iscc.exe not found on PATH. Ensure Inno Setup installed correctly."
          }
          & $isccCmd.Source SpecTrace.iss `
            /DMyAppVersion=${{ steps.version.outputs.ver }} `
            /DSourceDir=..\publish
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with exit code $LASTEXITCODE" }

      # ------------------------------------------------------------------ #
      # 7. Create portable ZIP
      # ------------------------------------------------------------------ #
      - name: Create portable ZIP
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.ver }}"
          Compress-Archive `
            -Path publish\*, README.md, LICENSE `
            -DestinationPath "SpecTrace-$ver-Portable.zip" `
            -Force

      # ------------------------------------------------------------------ #
      # 8. SHA-256 checksums (needed for winget manifests)
      # ------------------------------------------------------------------ #
      - name: Generate checksums
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.ver }}"
          $files = @(
            "SpecTrace-$ver-Portable.zip",
            "installer-output\SpecTrace-$ver-Setup.exe"
          )
          $lines = $files | ForEach-Object {
            $hash = (Get-FileHash $_ -Algorithm SHA256).Hash.ToLower()
            "$hash  $_"
          }
          $lines | Out-File -FilePath "SpecTrace-$ver-SHA256SUMS.txt" -Encoding UTF8
          Write-Host ($lines -join "`n")

      # ------------------------------------------------------------------ #
      # 9. Upload to GitHub Release
      # ------------------------------------------------------------------ #
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.ver }}"
          name: "SpecTrace v${{ steps.version.outputs.ver }}"
          draft: false
          prerelease: false
          files: |
            SpecTrace-${{ steps.version.outputs.ver }}-Portable.zip
            installer-output/SpecTrace-${{ steps.version.outputs.ver }}-Setup.exe
            SpecTrace-${{ steps.version.outputs.ver }}-SHA256SUMS.txt
          body: |
            ## SpecTrace v${{ steps.version.outputs.ver }}

            Windows system information tool — CPU, memory, GPU, storage, security and more in one view.

            ### Downloads

            | File | Description |
            |------|-------------|
            | `SpecTrace-${{ steps.version.outputs.ver }}-Setup.exe` | Installer — adds Start Menu entry; installs to `%ProgramFiles%\SpecTrace` (admin) or `%LocalAppData%\Programs\SpecTrace` (standard user) |
            | `SpecTrace-${{ steps.version.outputs.ver }}-Portable.zip` | Portable — extract and run, leaves nothing behind |
            | `SpecTrace-${{ steps.version.outputs.ver }}-SHA256SUMS.txt` | SHA-256 checksums for both files |

            **Both builds require the [.NET 8 Desktop Runtime](https://dotnet.microsoft.com/download/dotnet/8.0/runtime).** The installer will prompt and open the download page if it is not detected.

            ### System requirements
            - Windows 11 (build 22000) or later
            - x64 processor
            - .NET 8 Desktop Runtime

            ### winget
            ```
            winget install SpecTrace.SpecTrace
            ```
            *(available after the winget-pkgs manifest is merged for this version)*

            ---
            **[User Guide](https://github.com/${{ github.repository }}/blob/main/docs/USER_GUIDE.md)** · **[FAQ](https://github.com/${{ github.repository }}/blob/main/docs/FAQ.md)** · **[Report an issue](https://github.com/${{ github.repository }}/issues)**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}